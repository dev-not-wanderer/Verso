<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      CAPACITOR / MOBILE META
      viewport-fit=cover lets content extend into the safe-area on notched phones.
      The app itself uses padding/env(safe-area-inset-*) as needed.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
               user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA / home-screen install -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Verso" />

    <!-- Android theme colour (matches Verso dark bg) -->
    <meta name="theme-color" content="#0c0d10" />

    <title>Verso</title>

    <style>
      /* Hard reset — the React app owns all layout */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;

        /* Dark background while JS loads — matches Verso's default dark theme */
        background: #0c0d10;

        /* Disable rubber-band scroll on iOS */
        overscroll-behavior: none;

        /* Prevent callout / selection on long-press */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;

        /* Smooth font rendering */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Allow text selection only inside contenteditable areas */
      [contenteditable],
      [contenteditable] * {
        -webkit-user-select: text;
        user-select: text;
      }

      /*
        Safe-area padding helpers (opt-in via className).
        If you want the bottom nav to respect the home indicator on iOS,
        add padding-bottom: env(safe-area-inset-bottom) to that element.
      */
      .safe-top    { padding-top:    env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
      .safe-left   { padding-left:   env(safe-area-inset-left); }
      .safe-right  { padding-right:  env(safe-area-inset-right); }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!--
      Vite entry point.
      After `npm run build`, Vite replaces this with the hashed bundle path.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
